name: Deploy Showcase to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'showcase/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-size: 20
          cache: 'npm'
          cache-dependency-path: 'showcase/package-lock.json'

      - name: Install Dependencies
        run: |
          cd showcase
          npm install

      - name: Build Project
        run: |
          cd showcase
          npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: showcase/dist
          target-folder: showcase
          branch: gh-pages
          token: ${{ secrets.GITHUB_TOKEN }}
